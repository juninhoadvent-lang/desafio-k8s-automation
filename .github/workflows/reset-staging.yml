name: sync-branches

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  workflows: write    # <--- ESSENCIAL: Permite criar branches com workflows

jobs:
  reset-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          ref: main # Garante que estamos na main/master
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Limpar e Criar Branch
  run: |
    DATE=$(date +'%d-%m-%Y')
    BRANCH_NAME="stg/$DATE"

    echo "Criando branch $BRANCH_NAME..."

    # Cria a branch a partir da main
    git checkout -b $BRANCH_NAME

    # 🚨 Remove workflows para evitar erro de permissão
    rm -rf .github

    # Faz o push
    git push origin $BRANCH_NAME
