name: Reset Staging Weekly

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  workflows: write    # <--- ESSENCIAL: Permite criar branches com workflows

jobs:
  reset-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          ref: main # Garante que estamos na main/master
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Limpar e Criar Branch
        run: |
          # Define o nome da branch com a data de hoje
          DATE=$(date +'%d-%m-%Y')
          BRANCH_NAME="stg/$DATE"

          echo "Limpando ambiente para a branch: $BRANCH_NAME"

          # Tenta deletar a branch no remoto. 
          # O "|| true" garante que se a branch não existir, o script NÃO pare com erro.
          git push origin --delete $BRANCH_NAME || true

          # Também tenta deletar a branch 'staging' genérica se você a estiver usando
          git push origin --delete staging || true

          # Cria a nova branch localmente a partir da main
          git checkout -b $BRANCH_NAME
          # Sobe para o GitHub
          git push origin $BRANCH_NAME
